
name: Atualizar clientes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar
        run: echo "GitHub API preparada"

      - name: Commit autorizado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git status
