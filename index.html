<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Controle Transportadora</h1>

<h2>Cadastro de Cliente</h2>
<input id="nomeCliente" placeholder="Cliente">
<input id="telefoneCliente" placeholder="Telefone">
<input id="cidadeCliente" placeholder="Cidade">
<input id="estadoCliente" placeholder="Estado">
<button id="btnSalvarCliente">Salvar Cliente</button>
<p id="mensagem"></p>

<h2>Clientes Cadastrados</h2>
<table>
<thead><tr><th>Cliente</th><th>Telefone</th><th>Cidade</th><th>Estado</th></tr></thead>
<tbody id="clientesLista"></tbody>
</table>

<h2>Nova Movimentação</h2>
<select id="clienteSelect"></select>
<input id="caixas" placeholder="Caixas" type="number">
<input id="sacos" placeholder="Sacos" type="number">
<input id="valor" placeholder="Valor" type="number">
<input id="pago" placeholder="Pago" type="number">
<button>Salvar Transporte</button>

</div>
<script src="script.js"></script>
</body>
</html>
