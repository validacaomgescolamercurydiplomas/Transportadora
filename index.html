
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Controle Transportadora</h1>

<input id="cliente" placeholder="Cliente">
<input id="telefone" placeholder="Telefone" oninput="mascaraTelefone(this)">
<input id="cidade" placeholder="Cidade">

<select id="estado">
<option value="">Estado</option>
<option>AC</option><option>AL</option><option>AP</option><option>AM</option>
<option>BA</option><option>CE</option><option>DF</option><option>ES</option>
<option>GO</option><option>MA</option><option>MG</option><option>MT</option>
<option>MS</option><option>PA</option><option>PB</option><option>PR</option>
<option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
<option>RS</option><option>SC</option><option>SP</option><option>TO</option>
</select>

<button onclick="salvarCliente()">Salvar Cliente</button>

<p id="msg"></p>

<table>
<thead>
<tr><th>Cliente</th><th>Telefone</th><th>Cidade</th><th>Estado</th></tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>
<script src="script.js"></script>
</body>
</html>
