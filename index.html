<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Controle Transportadora</h1>

<div class="resumo">
<div>Total Caixas<br><b id="cx">0</b></div>
<div>Total Sacos<br><b id="sc">0</b></div>
<div>Total Itens<br><b id="it">0</b></div>
<div>Valor Total<br><b id="vt">R$ 0</b></div>
<div>Pago<br><b id="vp">R$ 0</b></div>
<div>Restante<br><b id="vr">R$ 0</b></div>
</div>

<h2>Nova Movimentação</h2>
<input id="cliente" placeholder="Cliente">
<input id="caixas" type="number" placeholder="Total Caixas">
<input id="sacos" type="number" placeholder="Total Sacos">
<input id="valor" type="number" placeholder="Valor Total">
<input id="pago" type="number" placeholder="Valor Pago">
<button onclick="salvar()">Salvar</button>

<h2>Controle por Cliente</h2>

<table>
<thead>
<tr>
<th>Cliente</th>
<th>Caixas</th>
<th>Sacos</th>
<th>Itens</th>
<th>Valor Total</th>
<th>Pago</th>
<th>Restante</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>
<script src="script.js"></script>
</body>
</html>
