<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Controle Transportadora</h1>

<h2>Cadastro Cliente</h2>
<input id="nomeCliente" placeholder="Cliente">
<input id="telefoneCliente" placeholder="Telefone">
<input id="cidadeCliente" placeholder="Cidade">
<input id="estadoCliente" placeholder="Estado">
<button onclick="salvarCliente()">Salvar Cliente</button>
<button onclick="cancelarCliente()">Cancelar</button>

<table>
<thead><tr><th>Cliente</th><th>Telefone</th><th>Cidade</th><th>Estado</th><th>Ação</th></tr></thead>
<tbody id="clientesLista"></tbody>
</table>

<h2>Movimentação</h2>
<input id="data" type="date">
<select id="cliente"></select>
<input id="caixas" type="number" placeholder="Caixas">
<input id="sacos" type="number" placeholder="Sacos">
<input id="valor" type="number" placeholder="Valor">
<input id="pago" type="number" placeholder="Pago">
<button onclick="salvarMovimento()">Salvar</button>
<button onclick="cancelarMov()">Cancelar</button>

<table>
<thead><tr><th>Data</th><th>Cliente</th><th>Caixas</th><th>Sacos</th><th>Itens</th><th>Valor</th><th>Pago</th><th>Restante</th><th>Ação</th></tr></thead>
<tbody id="relatorio"></tbody>
</table>
</div>
<script src="script.js"></script>
</body>
</html>
