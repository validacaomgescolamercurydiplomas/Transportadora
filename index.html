
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>CONTROLE TRANSPORTADORA</h1>

<h2>RESUMO</h2>
<div id="resumo"></div>

<h2>CLIENTES</h2>
<button onclick="mostrarCadastro()">+ NOVO CLIENTE</button>

<div id="cadastro">
<input id="nomeCliente" placeholder="CLIENTE">
<input id="telefoneCliente" placeholder="(00) 00000-0000">
<input id="cidadeCliente" placeholder="CIDADE">
<select id="estadoCliente"><option value="">ESTADO</option><option>MG</option><option>SP</option><option>RJ</option><option>GO</option><option>BA</option><option>TO</option></select>
<button onclick="salvarCliente()">SALVAR CLIENTE</button>
</div>

<input id="buscaCliente" placeholder="BUSCAR CLIENTE" onkeyup="buscarCliente()">

<table>
<tbody id="clientesLista"></tbody>
</table>

<h2>MOVIMENTAÇÃO</h2>
<input id="data" type="date">
<input id="buscaMovCliente" placeholder="BUSCAR CLIENTE" onkeyup="buscarClienteMov()">
<select id="cliente"></select>
<input id="caixas" type="number" placeholder="CAIXAS">
<input id="sacos" type="number" placeholder="SACOS">
<input id="valor" type="number" placeholder="VALOR">
<input id="pago" type="number" placeholder="PAGO">
<button onclick="salvarMov()">SALVAR MOVIMENTAÇÃO</button>

<table>
<tbody id="relatorio"></tbody>
</table>

</div>
<script src="script.js"></script>
</body>
</html>
