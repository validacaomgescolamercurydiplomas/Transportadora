
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>CONTROLE TRANSPORTADORA</h1>

<h2>CADASTRO CLIENTE</h2>
<input id="nomeCliente" placeholder="CLIENTE">
<input id="telefoneCliente" placeholder="(00) 00000-0000">
<input id="cidadeCliente" placeholder="CIDADE">
<select id="estadoCliente">
<option>SELECIONE ESTADO</option>
<option>MG</option><option>SP</option><option>RJ</option><option>GO</option><option>BA</option><option>TO</option>
</select>
<button onclick="salvarCliente()">SALVAR</button>
<button onclick="cancelarCliente()">CANCELAR</button>

<table>
<thead><tr><th>Cliente</th><th>Telefone</th><th>Cidade</th><th>Estado</th><th>Ações</th></tr></thead>
<tbody id="clientesLista"></tbody>
</table>

<h2>MOVIMENTAÇÃO</h2>
<input id="data" type="date">
<select id="cliente"></select>
<input id="caixas" type="number" placeholder="CAIXAS">
<input id="sacos" type="number" placeholder="SACOS">
<input id="valor" type="number" placeholder="VALOR">
<input id="pago" type="number" placeholder="PAGO">
<button onclick="salvarMov()">SALVAR MOVIMENTAÇÃO</button>

<table>
<thead><tr><th>Data</th><th>Cliente</th><th>Caixas</th><th>Sacos</th><th>Itens</th><th>Valor</th><th>Pago</th><th>Restante</th><th>Ações</th></tr></thead>
<tbody id="relatorio"></tbody>
</table>
</div>
<script src="script.js"></script>
</body>
</html>
