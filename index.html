
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Controle Transportadora</h1>

<div class="cards">
<div class="card"><h3>Faturamento</h3><p>R$ 0,00</p></div>
<div class="card"><h3>Recebido</h3><p>R$ 0,00</p></div>
<div class="card"><h3>Pendente</h3><p>R$ 0,00</p></div>
</div>

<h2>Cadastro de Cliente</h2>
<input placeholder="Nome do cliente">
<input placeholder="Telefone">
<input placeholder="Cidade">
<button>Salvar Cliente</button>

<h2>Nova Entrega</h2>
<input placeholder="Quantidade de sacos">
<input placeholder="Quantidade de caixas">
<input placeholder="Valor">
<select>
<option>Pago</option>
<option>Pendente</option>
</select>
<button>Registrar</button>

</div>

<script src="script.js"></script>
</body>
</html>
