
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Controle Transportadora</h1>

<input id="cliente" placeholder="Cliente">
<input id="telefone" placeholder="Telefone">
<input id="cidade" placeholder="Cidade">

<select id="estado">
<option>Estado</option>
<option>TO</option>
<option>GO</option>
<option>MG</option>
<option>SP</option>
<option>RJ</option>
<option>BA</option>
<option>MA</option>
</select>

<button onclick="salvarCliente()">Salvar Cliente</button>

<p id="msg"></p>

<h2>Clientes</h2>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Telefone</th>
<th>Cidade</th>
<th>Estado</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

<script src="script.js"></script>
</body>
</html>
