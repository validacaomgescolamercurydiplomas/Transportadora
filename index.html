<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Controle Transportadora</h1>

<h2>Nova Movimentação</h2>
<input id="data" type="date">
<select id="cliente"></select>
<input id="caixas" type="number" placeholder="Caixas">
<input id="sacos" type="number" placeholder="Sacos">
<input id="valor" type="number" placeholder="Valor Total">
<input id="pago" type="number" placeholder="Valor Pago">
<button onclick="salvar()">Salvar Transporte</button>

<h2>Resumo</h2>
<div id="resumo"></div>

<h2>Relatório</h2>
<table>
<thead>
<tr>
<th>Data</th><th>Cliente</th><th>Caixas</th><th>Sacos</th><th>Itens</th><th>Valor</th><th>Pago</th><th>Restante</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>
<script src="script.js"></script>
</body>
</html>
