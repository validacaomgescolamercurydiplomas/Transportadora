<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controle Transportadora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>CONTROLE TRANSPORTADORA</h1>

<h2>RESUMO SEMANAL</h2>
<p>Período automático: Segunda a Domingo</p>
<input id="inicioResumo" type="date">
<input id="fimResumo" type="date">
<button onclick="filtrarResumo()">Selecionar Período</button>

<div id="resumo"></div>

<h2>CADASTRO CLIENTE</h2>
<input id="nomeCliente" placeholder="CLIENTE">
<input id="telefoneCliente" placeholder="(00) 00000-0000">
<input id="cidadeCliente" placeholder="CIDADE">
<select id="estadoCliente"><option>MG</option><option>SP</option><option>RJ</option><option>GO</option><option>BA</option><option>TO</option></select>
<button onclick="salvarCliente()">SALVAR</button>

<h2>MOVIMENTAÇÃO</h2>
<input id="data" type="date">
<select id="cliente"></select>
<input id="caixas" type="number" placeholder="CAIXAS">
<input id="sacos" type="number" placeholder="SACOS">
<input id="valor" type="number" placeholder="VALOR">
<input id="pago" type="number" placeholder="PAGO">
<button onclick="salvarMov()">SALVAR</button>

<table>
<thead><tr><th>Data</th><th>Cliente</th><th>Caixas</th><th>Sacos</th><th>Itens</th><th>Valor</th><th>Pago</th><th>Restante</th></tr></thead>
<tbody id="relatorio"></tbody>
</table>
</div>
<script src="script.js"></script>
</body>
</html>
