<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Controle Transportadora</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
<h1>Controle Transportadora</h1>

<h2>Cadastro Cliente</h2>
<input id="nomeCliente" placeholder="Cliente">
<input id="telefoneCliente" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTelefone(this)">
<input id="cidadeCliente" placeholder="Cidade">
<select id="estadoCliente"><option>Selecione</option><option>MG</option><option>SP</option><option>RJ</option><option>GO</option><option>BA</option><option>TO</option></select>
<button onclick="salvarCliente()">Salvar</button>
<button onclick="limparCliente()">Cancelar</button>

<table><tbody id="clientesLista"></tbody></table>

<h2>Movimentação</h2>
<input id="data" type="date">
<select id="cliente"></select>
<input id="caixas" type="number" placeholder="Caixas">
<input id="sacos" type="number" placeholder="Sacos">
<input id="valor" type="number" placeholder="Valor">
<input id="pago" type="number" placeholder="Pago">
<button onclick="salvarMov()">Salvar</button>

<table><tbody id="relatorio"></tbody></table>
</div>
<script src="script.js"></script>
</body></html>
